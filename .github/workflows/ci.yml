name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nestjs_starter_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: nestjs_starter_test
      DATABASE_SSL: false
      DATABASE_LOGGING: false
      DATABASE_SYNCHRONIZE: true
      JWT_SECRET: ci_jwt_secret_that_is_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_that_is_at_least_32_chars_long
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3001
      SWAGGER_ENABLED: false
      BCRYPT_ROUNDS: 1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Create migrations database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c 'CREATE DATABASE nestjs_starter_migrations;'

      - name: Verify migrations apply to a clean schema
        run: pnpm migration:run:prod
        env:
          NODE_ENV: production
          DATABASE_NAME: nestjs_starter_migrations
          DATABASE_SYNCHRONIZE: false

      - name: Unit tests + coverage
        run: pnpm test:cov

      - name: E2E tests
        run: pnpm test:e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t nestjs-starter-kit:ci .
